# ==============================================================================
# CD Workflow - Deploy to Alibaba Cloud ECS
# ==============================================================================

name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: false
        default: 'latest'
        type: string

# Require manual approval before deployment
jobs:
  # ===========================================================================
  # Approval Gate
  # ===========================================================================
  approval:
    name: Approval Required
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Wait for approval
        run: |
          echo "Deployment requires manual approval from repository administrators."
          echo "Image tag: ${{ github.event.inputs.image_tag || 'latest' }}"
    environment:
      name: production
      url: ${{ vars.DEPLOY_URL || 'https://your-domain.com' }}

  # ===========================================================================
  # Deploy to ECS
  # ===========================================================================
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: approval
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH Key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
          ssh-known-hosts: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to ECS
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER || 'ubuntu' }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/maillife' }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
          DEPLOY_WEBHOOK_URL: ${{ vars.DEPLOY_WEBHOOK_URL || '' }}
        run: |
          echo "Deploying to $DEPLOY_USER@$DEPLOY_HOST"

          # Sync files to server (excluding sensitive data)
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='*.log' \
            --exclude='*.db' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ \
            $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/

          # Run deployment script
          ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST << 'ENDSSH'
            set -euo pipefail
            cd $DEPLOY_PATH

            # Export environment variables
            export IMAGE_TAG="$IMAGE_TAG"
            export DEPLOY_PATH="$DEPLOY_PATH"
            export DEPLOY_WEBHOOK_URL="${DEPLOY_WEBHOOK_URL:-}"

            # Make deploy script executable
            chmod +x scripts/deploy.sh

            # Run deploy script
            bash scripts/deploy.sh
          ENDSSH

          echo "Deployment completed successfully!"

      - name: Verify deployment
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER || 'ubuntu' }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/maillife' }}
        run: |
          # Wait a bit for services to stabilize
          sleep 10

          # Check if backend is responding
          if ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "curl -sf http://localhost:8000/health"; then
            echo "Backend health check passed!"
          else
            echo "Backend health check failed!"
            exit 1
          fi

          # Check if nginx is responding
          if ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "curl -sf http://localhost:80/health"; then
            echo "Nginx health check passed!"
          else
            echo "Nginx health check failed!"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: ${{ vars.SLACK_CHANNEL_ID || '' }}
          payload: |
            {
              "text": "Deployment failed!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *MailLife Deployment Failed*\n> Repository: ${{ github.repository }}\n> Branch: ${{ github.ref_name }}\n> Actor: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        continue-on-error: true
