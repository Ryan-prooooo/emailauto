# ==============================================================================
# Docker Compose - Production
# ==============================================================================

name: maillife

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: maillife-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../configs/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_backups:/backups
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Backend API Service
  # ---------------------------------------------------------------------------
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-owner/maillife}:maillife-backend-${IMAGE_TAG:-latest}
    container_name: maillife-backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      QQ_EMAIL: ${QQ_EMAIL}
      QQ_AUTH_CODE: ${QQ_AUTH_CODE}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL}
      CHECK_INTERVAL_MINUTES: ${CHECK_INTERVAL_MINUTES:-5}
      SCHEDULED_SEND_HOUR: ${SCHEDULED_SEND_HOUR:-9}
      SCHEDULED_SEND_MINUTE: ${SCHEDULED_SEND_MINUTE:-0}
      MCP_EML_PARSER_COMMAND: ${MCP_EML_PARSER_COMMAND}
      MCP_EML_PARSER_ARGS: ${MCP_EML_PARSER_ARGS}
      MCP_EML_PARSER_CWD: ${MCP_EML_PARSER_CWD}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    volumes:
      - backend_logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Frontend Web Application
  # ---------------------------------------------------------------------------
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-owner/maillife}:maillife-frontend-${IMAGE_TAG:-latest}
    container_name: maillife-frontend
    restart: always
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://${DOMAIN}/api}
      VITE_APP_NAME: ${VITE_APP_NAME:-MailLife}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: maillife-nginx
    restart: always
    volumes:
      - ../configs/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  postgres_data:
    driver: local
  postgres_backups:
    driver: local
  backend_logs:
    driver: local
